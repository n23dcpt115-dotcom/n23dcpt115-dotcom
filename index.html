<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ảnh bìa + Avatar khớp giữa</title>
  <style>
    body {
      margin: 0;
      background-color: #f4f4f4;
    }

    .cover-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: auto;
      height: 220px;
      background-image: url('banner.jpg'); 
      background-size: cover;
      background-position: center;
      border-radius: 10px;
      overflow: hidden;
    }

    .avatar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div class="cover-container">
    <img src="avatar.jpg" alt="Avatar" class="avatar">
  </div>

</body>
</html>
